<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro de Memória FATEC</title>

  <link rel="stylesheet" href="statics/styles/cards.css">
  <link rel="stylesheet" href="statics/styles/information.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

  <style>
    .carousel-indicators .active {
      background-color: var(--primary-color);
    }

    .carousel-control {
      width: 10%;
    }

    .card-carousel,
    .item.active>.card-carousel {
      max-width: 100%;
      text-align: center;
      margin: 0 10%;
      height: 600px;
    }

    .imagem-carrosel {
      max-height: 400px;
      height: 60%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .imagem-carrosel>img {
      height: 100%;
      width: auto;
      max-width: 90%;
      object-fit: contain;
    }

    .card-content>.card-text {
      padding-inline: 5%;
    }

    .carousel-indicators {
      bottom: 70px;
    }

    .card-carousel .card-title {
      font-size: 28px;
    }

    .card-carousel .card-text {
      font-size: 18px;
    }
  </style>
</head>

<body>

  <header>
    <h1 id="titulo-principal">Centro de Memória FATEC</h1>
  </header>

  <main>
    <div id="myCarousel" class="carousel slide" data-ride="carousel" data-interval="4000">

      <ol class="carousel-indicators" id="carousel-indicators"></ol>

      <div class="carousel-inner" id="carousel-container" role="listbox" style="height: 600px;"></div>

      <a class="left carousel-control" href="#myCarousel" role="button" data-slide="prev" style="opacity: 0.2;">
        <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
        <span class="sr-only">Previous</span>
      </a>

      <a class="right carousel-control" href="#myCarousel" role="button" data-slide="next" style="opacity: 0.2;">
        <span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>
        <span class="sr-only">Next</span>
      </a>

    </div>

    <section id="informacoes-detalhadas" style="display: none;"></section>
  </main>

  <script type="module" src="statics/js/renderCarrossel.js"></script>
  <script type="module" src="statics/js/renderConteudo.js"></script>

</body>

</html>
